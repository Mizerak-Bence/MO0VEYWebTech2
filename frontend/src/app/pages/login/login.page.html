<div class="page">
  <mat-card>
    <mat-card-title>Bejelentkezés</mat-card-title>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="form">
        <mat-form-field appearance="outline">
          <mat-label>Felhasználónév</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-error *ngIf="form.controls.username.touched && form.controls.username.invalid">
            A felhasználónév legalább 3 karakter.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Jelszó</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error *ngIf="form.controls.password.touched && form.controls.password.invalid">
            A jelszó kötelező.
          </mat-error>
        </mat-form-field>

        <div class="error" *ngIf="error()">{{ error() }}</div>

        <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
          Bejelentkezés
        </button>

        <a routerLink="/register" class="link">Nincs még fiókod? Regisztráció</a>
      </form>
    </mat-card-content>
  </mat-card>
</div>
